name: Cypress Ultra Fast CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cypress:
    runs-on: ubuntu-latest

    container:
      image: cypress/included:13.6.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (minimal)
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run Cypress tests
        run: npx cypress run